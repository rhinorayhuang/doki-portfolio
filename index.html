<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doki GSAP CCTV Video Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: #050505;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow-x: hidden;
      }

      .intro {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        text-align: center;
        background:
          radial-gradient(circle at center, rgba(255, 255, 255, 0.08), transparent 42%),
          #050505;
      }

      .intro h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 8vw, 96px);
        letter-spacing: 0.08em;
      }

      .intro p {
        max-width: 760px;
        margin: 0 auto 28px;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.8;
      }

      .start-button {
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 999px;
        padding: 14px 22px;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
        font: inherit;
      }

      .scroll-space {
        position: relative;
        height: 520vh;
      }

      .scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
        isolation: isolate;
      }

      .camera-layer {
        position: absolute;
        inset: 0;
        transform-origin: center;
        will-change: transform;
      }

      .cat-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.78) contrast(1.08) saturate(0.82);
        transform: scale(1.02);
        will-change: transform, filter;
      }

      .window-dim {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background:
          radial-gradient(
            circle at 56% 38%,
            rgba(0, 0, 0, 0.05) 0%,
            rgba(0, 0, 0, 0.08) 22%,
            rgba(0, 0, 0, 0.35) 72%,
            rgba(0, 0, 0, 0.72) 100%
          ),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.35));
        mix-blend-mode: multiply;
      }

      .scanlines {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        opacity: 0.16;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.11) 0 1px,
          transparent 2px 5px
        );
        mix-blend-mode: overlay;
      }

      .noise {
        position: absolute;
        inset: -20%;
        z-index: 5;
        pointer-events: none;
        opacity: 0.075;
        background-image:
          radial-gradient(circle at 20% 30%, white 0 1px, transparent 1px),
          radial-gradient(circle at 70% 80%, white 0 1px, transparent 1px),
          radial-gradient(circle at 45% 60%, white 0 1px, transparent 1px);
        background-size:
          36px 36px,
          51px 51px,
          73px 73px;
        animation: noiseMove 0.22s steps(2) infinite;
        mix-blend-mode: screen;
      }

      @keyframes noiseMove {
        from {
          transform: translate3d(0, 0, 0);
        }

        to {
          transform: translate3d(-18px, 12px, 0);
        }
      }

      .hud {
        position: absolute;
        inset: 18px;
        z-index: 10;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        font-size: clamp(12px, 1.4vw, 18px);
        text-shadow: 0 2px 8px #000;
        color: rgba(255, 255, 255, 0.92);
      }

      .hud-left,
      .hud-right {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.34);
        border: 1px solid rgba(255, 255, 255, 0.16);
      }

      .rec-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #ff3535;
        box-shadow: 0 0 14px #ff3535;
        animation: recBlink 1s steps(2) infinite;
      }

      @keyframes recBlink {
        50% {
          opacity: 0.25;
        }
      }

      .title-card {
        position: absolute;
        left: 50%;
        bottom: 9vh;
        z-index: 12;
        transform: translateX(-50%);
        text-align: center;
        opacity: 0;
        pointer-events: none;
        text-shadow: 0 4px 20px #000;
      }

      .title-card .eyebrow {
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.72);
        letter-spacing: 0.38em;
        font-size: 14px;
      }

      .title-card .title {
        font-size: clamp(44px, 9vw, 124px);
        line-height: 0.9;
        letter-spacing: 0.08em;
        font-weight: 800;
      }

      .title-card .menu {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        color: rgba(255, 255, 255, 0.78);
      }

      .progress {
        position: fixed;
        left: 0;
        bottom: 0;
        z-index: 50;
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.12);
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: rgba(255, 255, 255, 0.92);
      }

      .hint {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 50;
        padding: 8px 10px;
        color: rgba(255, 255, 255, 0.68);
        background: rgba(0, 0, 0, 0.42);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 12px;
      }

      @media (max-width: 768px) {
        .hud {
          inset: 12px;
        }

        .hud-right {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <section class="intro">
      <div>
        <h1>DOKI CCTV</h1>
        <p>
          用影片當素材，搭配 GSAP 控制監視器感、鏡頭晃動、景深模糊與標題進場。按下按鈕後往下滾，影片會跟著捲動進度播放。
        </p>
        <button class="start-button" type="button">開始 Demo</button>
      </div>
    </section>

    <section class="scroll-space">
      <div class="scene">
        <div class="camera-layer">
          <video class="cat-video" src="./assets/cat-run-demo.mp4" muted playsinline preload="auto"></video>
          <div class="window-dim"></div>
        </div>

        <div class="scanlines"></div>
        <div class="noise"></div>

        <div class="hud">
          <div class="hud-left">
            <span class="rec-dot"></span>
            <span>REC</span>
            <span>CAM 01</span>
          </div>
          <div class="hud-right">
            <span>2026/06/23</span>
            <span>11:46:38</span>
          </div>
        </div>

        <div class="title-card">
          <div class="eyebrow">WELCOME TO</div>
          <div class="title">DOKI'S ROOM</div>
          <div class="menu">
            <span>START</span>
            <span>PROFILE</span>
            <span>GALLERY</span>
            <span>CONTACT</span>
          </div>
        </div>
      </div>
    </section>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>
    <div class="hint">Scroll to scrub video</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script>
      gsap.registerPlugin(ScrollTrigger);

      const video = document.querySelector(".cat-video");
      const startButton = document.querySelector(".start-button");
      const cameraLayer = document.querySelector(".camera-layer");
      const titleCard = document.querySelector(".title-card");
      const progressBar = document.querySelector(".progress-bar");

      startButton.addEventListener("click", () => {
        document.querySelector(".scroll-space").scrollIntoView({ behavior: "smooth" });
      });

      function buildTimeline() {
        video.pause();
        video.currentTime = 0;

        const duration = video.duration || 1;
        const playhead = {
          current: 0,
          target: 0,
          lastSeek: 0,
        };

        gsap.ticker.add(() => {
          if (video.readyState === 0) return;

          playhead.current += (playhead.target - playhead.current) * 0.18;

          const now = performance.now();
          const timeDelta = Math.abs(video.currentTime - playhead.current);

          if (timeDelta > 0.025 && now - playhead.lastSeek > 33) {
            video.currentTime = playhead.current;
            playhead.lastSeek = now;
          }
        });

        ScrollTrigger.create({
          trigger: ".scroll-space",
          start: "top top",
          end: "bottom bottom",
          scrub: 0.85,
          pin: ".scene",
          pinSpacing: false,
          anticipatePin: 1,
          invalidateOnRefresh: true,
          onUpdate: (self) => {
            progressBar.style.width = `${self.progress * 100}%`;
            playhead.target = duration * self.progress;
          },
        });

        const fx = gsap.timeline({
          scrollTrigger: {
            trigger: ".scroll-space",
            start: "top top",
            end: "bottom bottom",
            scrub: 0.85,
          },
        });

        fx.to(
          video,
          {
            scale: 1.08,
            filter: "brightness(0.72) contrast(1.16) saturate(0.78) blur(0px)",
            duration: 0.28,
          },
          0.38,
        )
          .to(
            video,
            {
              scale: 1.16,
              filter: "brightness(0.60) contrast(1.24) saturate(0.70) blur(4px)",
              duration: 0.22,
            },
            0.62,
          )
          .to(cameraLayer, { x: 10, y: -8, rotate: 0.25, duration: 0.025, repeat: 8, yoyo: true }, 0.72)
          .to(titleCard, { opacity: 1, y: -24, duration: 0.18 }, 0.78)
          .to(
            video,
            {
              filter: "brightness(0.38) contrast(1.28) saturate(0.55) blur(7px)",
              scale: 1.22,
              duration: 0.2,
            },
            0.82,
          );
      }

      if (video.readyState >= 1) {
        buildTimeline();
      } else {
        video.addEventListener("loadedmetadata", buildTimeline, { once: true });
      }
    </script>
  </body>
</html>
